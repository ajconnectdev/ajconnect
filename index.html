<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJ Connect – Anmelden</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0F1F3D;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px}
.lm{width:46px;height:46px;background:#C8941A;border-radius:10px;position:relative;flex-shrink:0}
.lm::before{content:'';position:absolute;left:50%;top:9px;transform:translateX(-50%);width:6px;height:28px;background:#fff;border-radius:3px}
.lm::after{content:'';position:absolute;top:18px;left:9px;width:28px;height:6px;background:#fff;border-radius:3px}
.ln{font-size:22px;font-weight:700;color:#1A3560;font-family:Georgia,serif}
.ls{font-size:10px;color:#9CA3AF;letter-spacing:1.2px;text-transform:uppercase;margin-top:2px}
h2{font-size:18px;font-weight:600;color:#1A3560;text-align:center;margin-bottom:4px}
p{font-size:13px;color:#6B7280;text-align:center;margin-bottom:22px}
.fg{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:500;color:#6B7280;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:14px;outline:none;transition:border .15s;font-family:inherit}
input:focus{border-color:#1A3560}
.btn{width:100%;padding:11px;background:#1A3560;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit}
.btn:hover{background:#243d6e}
.btn:disabled{background:#9CA3AF;cursor:not-allowed}
.err{background:#FEE2E2;color:#DC2626;border:1px solid #fca5a5;border-radius:8px;padding:10px 13px;font-size:13px;margin-bottom:12px;display:none}
.ok{background:#DCFCE7;color:#16A34A;border:1px solid #86efac;border-radius:8px;padding:10px 13px;font-size:13px;margin-bottom:12px;display:none}
.link{text-align:center;margin-top:12px}
.link a{font-size:12px;color:#C8941A;text-decoration:none;font-weight:500}
.badges{display:flex;justify-content:center;gap:8px;margin-top:14px}
.badge{font-size:10px;color:#9CA3AF;border:1px solid rgba(255,255,255,0.1);padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:4px}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#4ade80}
</style>
</head>
<body>
<div>
  <div class="card">
    <div class="logo">
      <div class="lm"></div>
      <div><div class="ln">AJ Connect</div><div class="ls">Connect. Organize. Grow.</div></div>
    </div>
    <h2>Willkommen zurück</h2>
    <p>Melden Sie sich bei Ihrer Gemeinde an</p>
    <div class="err" id="err"></div>
    <div class="ok" id="ok"></div>
    <div class="fg">
      <label>E-Mail</label>
      <input type="email" id="email" placeholder="pastor@gemeinde.ch" autocomplete="email">
    </div>
    <div class="fg">
      <label>Passwort</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="btn" onclick="login()">Anmelden</button>
    <div class="link"><a href="#" onclick="showReset();return false">Passwort vergessen?</a></div>
    <div id="debug"></div>
  </div>
  <div class="badges">
    <span class="badge">Verschlüsselt</span>
    <span class="badge">Server Zürich CH</span>
    <span class="badge">DSG-konform</span>
  </div>
</div>

<script>
const SB_URL = 'https://gpmwlkqwdfxkenyebjmj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwbXdsa3F3ZGZ4a2VueWViam1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NTM1NTcsImV4cCI6MjA5MTAyOTU1N30.7d6aHR79PuRi_K7D8ikIGMxojKApIVBYE6yaW6UId8w';
const sb = supabase.createClient(SB_URL, SB_KEY);

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.style.display = 'block';
  document.getElementById('ok').style.display = 'none';
}
function showOk(msg) {
  const o = document.getElementById('ok');
  o.textContent = msg; o.style.display = 'block';
  document.getElementById('err').style.display = 'none';
}
function hideAll() {
  document.getElementById('err').style.display = 'none';
  document.getElementById('ok').style.display = 'none';
}

async function login() {
  hideAll();
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('pw').value;
  
  if (!email || !pw) { showErr('Bitte E-Mail und Passwort eingeben.'); return; }
  
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Wird angemeldet...';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    
    if (error) {
      dbg('Auth error: ' + error.message);
      btn.disabled = false;
      btn.textContent = 'Anmelden';
      if (error.message.includes('Invalid') || error.message.includes('invalid')) {
        showErr('E-Mail oder Passwort falsch.');
      } else {
        showErr('Fehler: ' + error.message);
      }
      return;
    }
    
    dbg('2. Login OK, user: ' + data.user.id.substring(0,8) + '...');
    
    // Load profile
    const { data: profile, error: pErr } = await sb
      .from('profiles')
      .select('*')
      .eq('id', data.user.id)
      .single();
    
    if (pErr) {
      dbg('Profile error: ' + pErr.message);
      showErr('Profil nicht gefunden: ' + pErr.message);
      btn.disabled = false;
      btn.textContent = 'Anmelden';
      return;
    }
    
    dbg('4. Profil: rolle=' + profile.rolle + ' aktiv=' + profile.aktiv);
    
    if (!profile.aktiv) {
      await sb.auth.signOut();
      showErr('Konto noch nicht freigeschaltet. Bitte warten Sie auf die Aktivierung.');
      btn.disabled = false;
      btn.textContent = 'Anmelden';
      return;
    }
    
    // Save to sessionStorage
    const sess = {
      user_id: data.user.id,
      email: data.user.email,
      name: profile.name || data.user.email,
      rolle: profile.rolle,
      mandant_id: profile.mandant_id || null,
      mandant_name: 'AJ Connect',
      lizenz: 'professional',
    };
    
    // If not superadmin, load mandant info
    if (profile.rolle !== 'superadmin' && profile.mandant_id) {
      const { data: mand } = await sb
        .from('mandanten')
        .select('name, lizenz, aktiv')
        .eq('id', profile.mandant_id)
        .single();
      
      if (!mand || !mand.aktiv) {
        await sb.auth.signOut();
        showErr('Ihre Gemeinde hat keine aktive Lizenz. Kontakt: info@ajconnect.ch');
        btn.disabled = false;
        btn.textContent = 'Anmelden';
        return;
      }
      sess.mandant_name = mand.name;
      sess.lizenz = mand.lizenz;
      dbg('6. Mandant: ' + mand.name);
    }
    
    sessionStorage.setItem('ajc_session', JSON.stringify(sess));
    
    showOk('Anmeldung erfolgreich! Weiterleitung...');
    
    setTimeout(() => {
      if (profile.rolle === 'superadmin') {
        window.location.replace('admin.html');
      } else {
        window.location.replace('app.html');
      }
    }, 800);
    
  } catch(e) {
    dbg('Exception: ' + e.message);
    showErr('Unerwarteter Fehler: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Anmelden';
  }
}

function showReset() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showErr('Bitte zuerst E-Mail eingeben.'); return; }
  sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/index.html'
  }).then(({error}) => {
    if (error) showErr('Fehler: ' + error.message);
    else showOk('Reset-Link gesendet! Bitte E-Mail-Postfach prüfen.');
  });
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
